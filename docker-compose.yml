services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - ISC_CPF_MERGE_FILE=/home/irisowner/dev/merge.cpf
    ports:
      - 1972
      - 52773:52773   # IRIS built-in web server (serves the results UI at a stable URL)
      - 53773
    volumes:
      - ./:/home/irisowner/dev
